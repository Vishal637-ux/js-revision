<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<style>
body{margin:0;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);}
.card{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.15);text-align:center;max-width:500px;width:90%;}
h1{font-size:2.2rem;margin:0 0 10px;}
h2{margin:10px 0;color:#444;}
p{color:#666;font-size:1.1rem;}
button{margin-top:20px;padding:12px 22px;border:none;border-radius:12px;background:#111;color:#fff;font-size:1rem;cursor:pointer;}
button:hover{transform:scale(1.05);}
</style>
</head>
<body>
<div class="card">
<h1>🎉 Happy Birthday 🎂</h1>
<h2 id="name">Pyarelal</h2>
<p>Another year older, but still no system update found 😄</p>
<button onclick="surprise()">Click for Surprise</button>
<div id="gallery" style="display:none;margin-top:20px;gap:10px;grid-template-columns:repeat(2,1fr);">
<img src="https://via.placeholder.com/200x140?text=Memory+1" style="width:100%;border-radius:12px;" />
<img src="https://via.placeholder.com/200x140?text=Memory+2" style="width:100%;border-radius:12px;" />
<img src="https://via.placeholder.com/200x140?text=Memory+3" style="width:100%;border-radius:12px;" />
<img src="https://via.placeholder.com/200x140?text=Memory+4" style="width:100%;border-radius:12px;" />
</div>
</div>
<script>
function surprise(){
 const newWindow = window.open('', '_blank');
 newWindow.document.write(`<!DOCTYPE html><html><head><title>Memories</title><style>body{font-family:Arial,sans-serif;background:#f8f8f8;padding:30px;text-align:center;}h1{margin-bottom:20px;} .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;max-width:700px;margin:auto;} img{width:100%;border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,.12);}</style></head><body><h1>📸 Beautiful Memories with Pyarelal</h1><div class='grid'><img src='https://via.placeholder.com/300x200?text=Memory+1'><img src='https://via.placeholder.com/300x200?text=Memory+2'><img src='https://via.placeholder.com/300x200?text=Memory+3'><img src='https://via.placeholder.com/300x200?text=Memory+4'></div></body></html>`);
}
</script>
</body>
</html>
